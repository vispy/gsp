[project]
name = "gsp-matplotlib"
version = "0.2.0a1"
description = "Matplotlib reference backend for GSP."
requires-python = ">=3.13,<4"
dependencies = ["gsp-core==0.2.0a1", "matplotlib>=3.10,<4"]

[build-system]
requires = ["hatchling>=1.27,<2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gsp_matplotlib"]

