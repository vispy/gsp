[project]
name = "gsp-core"
version = "0.2.0a1"
description = "Backend-independent graphics session protocol for scientific visualization."
requires-python = ">=3.13,<4"
dependencies = ["numpy>=2.3,<3"]

[build-system]
requires = ["hatchling>=1.27,<2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gsp"]

